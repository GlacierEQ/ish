# =============================================================================
# APEX .tmux.conf — optimized for iPhone iSH narrow-screen + remote Codex
# =============================================================================

# --- Prefix: Ctrl-a (easier on iPhone keyboard than Ctrl-b) -----------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Mouse support (tap to select pane/window) ------------------------------
set -g mouse on

# --- Reduce escape delay (critical for vim inside tmux) ---------------------
set -sg escape-time 10
set -g repeat-time 600

# --- Base index from 1 (top-left key on keyboard) ---------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Terminal colors --------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Status bar — minimal, fits iPhone width --------------------------------
set -g status on
set -g status-interval 5
set -g status-left-length 20
set -g status-right-length 40

set -g status-style "bg=#1c1b19,fg=#cdccca"
set -g status-left "#[fg=#4f98a3,bold]APEX #[fg=#cdccca]| "
set -g status-right "#[fg=#7a7974]%H:%M #[fg=#4f98a3]HST"

set -g window-status-format         "#[fg=#7a7974] #I:#W "
set -g window-status-current-format "#[fg=#cdccca,bold,bg=#2d2c2a] #I:#W "

# --- Pane borders -----------------------------------------------------------
set -g pane-border-style        "fg=#393836"
set -g pane-active-border-style "fg=#4f98a3"

# --- Activity ---------------------------------------------------------------
setw -g monitor-activity on
set  -g visual-activity off

# --- Vim-style pane navigation ----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane split shortcuts ---------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Resize panes (repeatable) ----------------------------------------------
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# --- Reload config ----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Copy mode: vi keys -----------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Session persistence (keep alive on disconnect) -------------------------
set -g detach-on-destroy off

# --- APEX named sessions layout on launch -----------------------------------
# Window 1: codex   — main Codex CLI interaction
# Window 2: shell   — general shell / git / file ops
# Window 3: monitor — htop / logs / watch
# (apex-launch.sh creates these; this file just sets the naming expectation)
